<!-- register page (for student account creation)-->
{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block body_class %}page-auth{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h2 class="auth-title">Create Account</h2>
    <p class="auth-subtitle">Register as a student to apply for enrollment</p>

    <form method="POST" class="form-auth">
      <div class="form-group">
        <label for="username">Username</label>
        <input 
          type="text" 
          id="username" 
          name="username" 
          placeholder="Choose a username"
          required
        >
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder="Enter a password"
          required
        >
      </div>

      <button type="submit" class="btn-navy btn-block">Create Account</button>
    </form>

    <div class="auth-footer">
      <p>Already have an account? <a href="{{ url_for('login') }}">Sign in here</a></p>
    </div>
  </div>
</div>
{% endblock %}
